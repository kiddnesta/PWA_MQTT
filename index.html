<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISC-V 传感器监控</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            border-bottom: 2px solid #007bff;
            padding-bottom: 12px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.25rem;
        }

        .data-item {
            margin: 18px 0;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .value-box {
            font-weight: bold;
            color: #007bff;
            font-size: 1.3em;
        }

        .unit {
            color: #888;
            font-size: 0.7em;
            margin-left: 4px;
        }

        .status {
            font-size: 0.7em;
            color: #ff4757;
            /* 默认红色离线 */
            transition: color 0.3s;
        }

        #altitude-box {
            color: #2ecc71;
        }

        /* 海拔换个颜色区分 */
    </style>
</head>

<body>
    <div class="card">
        <h2>设备状态 <span id="stat" class="status">● 离线</span></h2>

        <div class="data-item">温度: <div><span id="temp" class="value-box">--</span><span class="unit">℃</span></div>
        </div>
        <div class="data-item">湿度: <div><span id="humi" class="value-box">--</span><span class="unit">%RH</span></div>
        </div>
        <div class="data-item">压力: <div><span id="pres" class="value-box">--</span><span class="unit">Pa</span></div>
        </div>
        <div class="data-item">光照: <div><span id="lux" class="value-box">--</span><span class="unit">lux</span></div>
        </div>
        <div class="data-item">海拔: <div><span id="alti" class="value-box">--</span><span class="unit">m</span></div>
        </div>
    </div>

    <script>
        // 1. 配置你的唯一主题
        const myTopic = "sensor/18168092625";

        // 2. 连接 EMQX 公共服务器 (WebSocket 专用加密端口 8084)
        // 如果 8084 连不上，可以尝试更换为 443
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        const statEl = document.getElementById('stat');

        client.on('connect', () => {
            statEl.innerText = "● 在线";
            statEl.style.color = "#2ecc71"; // 变绿
            console.log("已连接到 MQTT 服务器");
            client.subscribe(myTopic);
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                console.log("收到数据:", data);

                // 核心：使用 parseFloat 将你发来的字符串转为数字
                const t = parseFloat(data.temp);
                const h = parseFloat(data.humidity);
                const p = parseFloat(data.pressure);
                const l = parseFloat(data.lux);
                const a = parseFloat(data.altitude);

                // 更新 UI，并保留 1 位小数
                if (!isNaN(t)) document.getElementById('temp').innerText = t.toFixed(1);
                if (!isNaN(h)) document.getElementById('humi').innerText = h.toFixed(1);
                if (!isNaN(p)) document.getElementById('pres').innerText = p.toFixed(1);
                if (!isNaN(l)) document.getElementById('lux').innerText = l.toFixed(1);
                if (!isNaN(a)) document.getElementById('alti').innerText = a.toFixed(1);

            } catch (e) {
                console.error("数据解析失败:", e);
            }
        });

        client.on('error', (err) => {
            console.error("连接错误: ", err);
            statEl.innerText = "● 连接错误";
            statEl.style.color = "#ff4757";
        });

        client.on('close', () => {
            statEl.innerText = "● 离线";
            statEl.style.color = "#ff4757";
        });
    </script>
</body>

</html>
